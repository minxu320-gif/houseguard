# Production-style stack: copy .env.example -> .env and set secrets (never commit .env).
services:
  db:
    image: mysql:8.0
    container_name: houseguard_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-houseguard}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: houseguard_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: houseguard_web
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web,nginx}
      DJANGO_BEHIND_HTTPS_PROXY: ${DJANGO_BEHIND_HTTPS_PROXY:-1}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn house_system.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: houseguard_nginx
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
